@if(!getListItems().length){
  <div class="container">
    <img src="assets/img/task-list-null.png" alt="sua lista de tarefas está vazia" loading="eager"/>

    @if(addItem()){
      <button class="btn btn-primary" (click)="addItem.set(false)">Crie uma lista de tarefas</button>
    } @else {
      <app-input-add-item [inputListItems]="getListItems()"
      (outputAddListItens)="getInputAndAddItem($event)" />
    }

  </div>
} @else {
    <app-input-add-item [inputListItems]="getListItems()"
    (outputAddListItens)="getInputAndAddItem($event)" />

    <main class="container">
      @if(listItemsStage('pending').length){
        <h2>Pendências</h2>
        <app-input-list-items
          [inputListItems]="listItemsStage('pending')"
          (outputUpdateItemCheckbox)="updateItemCheckboxes($event)"
          (outputUpdateItemText)="updateItemText($event)"
          (outputDeleteItem)="deleteItem($event)"
        />
      }

      @if(listItemsStage('completed').length){
        <h2>Concluídas</h2>
        <app-input-list-items
          [inputListItems]="listItemsStage('completed')"
          (outputUpdateItemCheckbox)="updateItemCheckboxes($event)"
          (outputUpdateItemText)="updateItemText($event)"
          (outputDeleteItem)="deleteItem($event)"
        />
      }
    </main>

    <footer>
      <button class="btn btn-danger" (click)="deleteAllItems()">Limpar lista</button>
    </footer>
}
